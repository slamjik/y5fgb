services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - ./env/postgres.dev.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d secure_messenger"]
      interval: 5s
      timeout: 5s
      retries: 10

  relay-server:
    build:
      context: ../apps/relay-server
      dockerfile: Dockerfile
    env_file:
      - ./env/relay-server.dev.env
    ports:
      - "8080:8080"
    volumes:
      - relay_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  pgdata:
  relay_data:
