services:
  postgres:
    image: postgres:16.10-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend

  relay-server:
    image: secure-messenger-relay:${RELAY_IMAGE_TAG:-latest}
    build:
      context: ./apps/relay-server
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      HTTP_HOST: ${HTTP_HOST:-0.0.0.0}
      HTTP_PORT: ${HTTP_PORT:-8080}
      HEALTH_PATH: ${HEALTH_PATH:-/health}
      READY_PATH: ${READY_PATH:-/ready}
      WS_PATH: ${WS_PATH:-/ws}
      API_PREFIX: ${API_PREFIX:-/api/v1}
      RUN_MIGRATIONS_ON_START: ${RUN_MIGRATIONS_ON_START:-true}
      DATABASE_URL: ${DATABASE_URL}
      HTTP_READ_TIMEOUT_SEC: ${HTTP_READ_TIMEOUT_SEC:-120}
      HTTP_WRITE_TIMEOUT_SEC: ${HTTP_WRITE_TIMEOUT_SEC:-120}
      HTTP_IDLE_TIMEOUT_SEC: ${HTTP_IDLE_TIMEOUT_SEC:-60}
      HTTP_SHUTDOWN_TIMEOUT_SEC: ${HTTP_SHUTDOWN_TIMEOUT_SEC:-10}
      AUTH_ACCESS_TOKEN_TTL_MIN: ${AUTH_ACCESS_TOKEN_TTL_MIN:-15}
      AUTH_REFRESH_TOKEN_TTL_HOURS: ${AUTH_REFRESH_TOKEN_TTL_HOURS:-720}
      AUTH_2FA_CHALLENGE_TTL_MIN: ${AUTH_2FA_CHALLENGE_TTL_MIN:-5}
      AUTH_2FA_ISSUER: ${AUTH_2FA_ISSUER:-SecureMessenger}
      AUTH_TOKEN_PEPPER: ${AUTH_TOKEN_PEPPER}
      SECURITY_ENCRYPTION_KEY: ${SECURITY_ENCRYPTION_KEY}
      MESSAGING_ATTACHMENTS_DIR: ${MESSAGING_ATTACHMENTS_DIR:-/app/data/attachments}
      MESSAGING_ATTACHMENT_MAX_BYTES: ${MESSAGING_ATTACHMENT_MAX_BYTES:-20971520}
      MESSAGING_UNATTACHED_TTL_HOURS: ${MESSAGING_UNATTACHED_TTL_HOURS:-24}
      MEDIA_STORAGE_BACKEND: ${MEDIA_STORAGE_BACKEND:-local}
      MEDIA_LOCAL_DIR: ${MEDIA_LOCAL_DIR:-/app/data/media}
      MEDIA_LOCAL_MAX_TOTAL_BYTES: ${MEDIA_LOCAL_MAX_TOTAL_BYTES:-1073741824}
      MEDIA_LOCAL_MAX_PER_USER_BYTES: ${MEDIA_LOCAL_MAX_PER_USER_BYTES:-268435456}
      MEDIA_MAX_AVATAR_BYTES: ${MEDIA_MAX_AVATAR_BYTES:-5242880}
      MEDIA_MAX_BANNER_BYTES: ${MEDIA_MAX_BANNER_BYTES:-10485760}
      MEDIA_MAX_PHOTO_BYTES: ${MEDIA_MAX_PHOTO_BYTES:-15728640}
      MEDIA_MAX_VIDEO_BYTES: ${MEDIA_MAX_VIDEO_BYTES:-52428800}
      MEDIA_STORY_TTL_HOURS: ${MEDIA_STORY_TTL_HOURS:-24}
      MEDIA_SOFT_DELETE_RETENTION_HOURS: ${MEDIA_SOFT_DELETE_RETENTION_HOURS:-72}
      MEDIA_S3_ENDPOINT: ${MEDIA_S3_ENDPOINT:-}
      MEDIA_S3_REGION: ${MEDIA_S3_REGION:-us-east-1}
      MEDIA_S3_BUCKET: ${MEDIA_S3_BUCKET:-}
      MEDIA_S3_ACCESS_KEY: ${MEDIA_S3_ACCESS_KEY:-}
      MEDIA_S3_SECRET_KEY: ${MEDIA_S3_SECRET_KEY:-}
      MEDIA_S3_FORCE_PATH_STYLE: ${MEDIA_S3_FORCE_PATH_STYLE:-false}
      MEDIA_S3_PUBLIC_BASE_URL: ${MEDIA_S3_PUBLIC_BASE_URL:-}
      TRANSPORT_PRIMARY_WS_ENDPOINT: ${TRANSPORT_PRIMARY_WS_ENDPOINT}
      TRANSPORT_ALTERNATE_ENDPOINTS: ${TRANSPORT_ALTERNATE_ENDPOINTS:-}
      TRANSPORT_WS_QUERY_TOKEN_FALLBACK: ${TRANSPORT_WS_QUERY_TOKEN_FALLBACK:-false}
      TRANSPORT_LONG_POLL_ENABLED: ${TRANSPORT_LONG_POLL_ENABLED:-true}
      TRANSPORT_LONG_POLL_TIMEOUT_SEC: ${TRANSPORT_LONG_POLL_TIMEOUT_SEC:-25}
      TRANSPORT_RECONNECT_BACKOFF_MIN_MS: ${TRANSPORT_RECONNECT_BACKOFF_MIN_MS:-500}
      TRANSPORT_RECONNECT_BACKOFF_MAX_MS: ${TRANSPORT_RECONNECT_BACKOFF_MAX_MS:-10000}
      WEB_ALLOWED_ORIGINS: ${WEB_ALLOWED_ORIGINS:-}
      WEB_ALLOW_TAURI_ORIGIN: ${WEB_ALLOW_TAURI_ORIGIN:-false}
      WEB_ALLOW_NULL_ORIGIN: ${WEB_ALLOW_NULL_ORIGIN:-false}
      WEB_ALLOW_LOCALHOST_ORIGIN: ${WEB_ALLOW_LOCALHOST_ORIGIN:-false}
      WEB_ALLOW_LOCALHOST_SUBDOMAINS: ${WEB_ALLOW_LOCALHOST_SUBDOMAINS:-false}
      WEB_TRUST_PROXY_HEADERS: ${WEB_TRUST_PROXY_HEADERS:-false}
      WEB_SESSION_DEFAULT_PERSISTENCE: ${WEB_SESSION_DEFAULT_PERSISTENCE:-ephemeral}
      WEB_SESSION_ALLOW_REMEMBERED: ${WEB_SESSION_ALLOW_REMEMBERED:-true}
    volumes:
      - attachments:/app/data/attachments
      - media_data:/app/data/media
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - backend

  web-client:
    image: secure-messenger-web:${WEB_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/client-web/Dockerfile
      args:
        VITE_API_BASE_URL: ${API_BASE}
        VITE_WS_URL: ${WS_URL}
        VITE_API_PREFIX: ${API_PREFIX:-/api/v1}
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      relay-server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  caddy:
    image: caddy:2.10-alpine
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST}
      ACME_EMAIL: ${ACME_EMAIL}
      API_PREFIX: ${API_PREFIX:-/api/v1}
      WS_PATH: ${WS_PATH:-/ws}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      relay-server:
        condition: service_healthy
      web-client:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend

volumes:
  pgdata:
  attachments:
  media_data:
  caddy_data:
  caddy_config:

networks:
  backend:
    driver: bridge
